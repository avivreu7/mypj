        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            let html = '';
            categoriesConfig.forEach(cat => {
                const catVideos = videoData.filter(v => v.cat === cat.id);
                if (catVideos.length === 0) return;
                html += `
                    <div class="slide-up pl-4 sm:pl-0">
                        <h2 class="text-lg sm:text-2xl font-bold mb-3 px-4 sm:px-0 text-gray-100">${cat.title}</h2>
                        <div class="row-container flex gap-3 overflow-x-auto hide-scrollbar px-4 sm:px-0 pb-4 snap-x snap-mandatory">
                            ${catVideos.map(v => createVideoCard(v)).join('')}
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function renderFavorites() {
            const favSection = document.getElementById('favorites-section');
            const favRow = document.getElementById('favorites-row');
            if (favorites.length === 0) {
                favSection.classList.add('hidden');
                return;
            }
            favSection.classList.remove('hidden');
            const favVideos = videoData.filter(v => favorites.includes(v.id));
            favRow.innerHTML = favVideos.map(v => createVideoCard(v)).join('');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const mainContent = document.getElementById('main-content-wrapper');
            const searchResultsSection = document.getElementById('search-results-section');
            const searchGrid = document.getElementById('search-grid');

            if (query.length === 0) {
                mainContent.classList.remove('hidden');
                searchResultsSection.classList.add('hidden');
                return;
            }

            mainContent.classList.add('hidden');
            searchResultsSection.classList.remove('hidden');

            const filtered = videoData.filter(v => 
                v.title.toLowerCase().includes(query) || categoriesConfig.find(c => c.id === v.cat).title.toLowerCase().includes(query)
            );
            
            if (filtered.length === 0) {
                searchGrid.innerHTML = `<div class="text-gray-400 col-span-full text-center py-10 w-full"><span class="text-4xl">🤔</span><p class="mt-2">לא נמצאו שירים תואמים לחיפוש...</p></div>`;
            } else {
                searchGrid.innerHTML = filtered.map(v => createVideoCard(v)).join('');
            }
        }

        function playRandomVideo() {
            const randomVideo = videoData[Math.floor(Math.random() * videoData.length)];
            openVideo(randomVideo.id);
            showToast('בוחר שיר באקראי... 🎲');
        }

        // --- וידאו ונגן ---
        function openVideo(id) {
            currentOpenVideoId = id;
            const video = videoData.find(v => v.id === id);
            document.getElementById('modal-title').innerText = video ? video.title : 'שיר מגן תות';
            
            // שימוש ב-YouTube API
            if (!ytPlayer) {
                ytPlayer = new YT.Player('youtube-player', {
                    videoId: id,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
                    events: {
                        'onStateChange': onPlayerStateChange
                    }
                });
            } else {
                ytPlayer.loadVideoById(id);
            }
            
            updateFavoriteModalUI();

            const modal = document.getElementById('video-modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            if (!isMiniPlayer) {
                document.body.style.overflow = 'hidden'; // מניעת גלילה מאחור
                modal.classList.add('modal-overlay');
            }

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                if(!isMiniPlayer) {
                    content.classList.remove('scale-95');
                    content.classList.add('scale-100');
                }
            }, 10);
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            if(!isMiniPlayer) {
                content.classList.remove('scale-100');
                content.classList.add('scale-95');
            }
            
            if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
                ytPlayer.stopVideo();
            }

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto'; 
                currentOpenVideoId = null;
                
                // כיבוי שמע בלבד אם פעל
                document.getElementById('audio-only-overlay').classList.add('hidden');
                
                // איפוס חלון צף
                if (isMiniPlayer) toggleMiniPlayer();
            }, 300);
        }

        // --- קונפטי בעת סיום סרטון ---
        function onPlayerStateChange(event) {
            // PlayerState: 0 = ENDED
            if (event.data === 0) {
                triggerStrawberryConfetti();
                
                // אופציונלי: יציאה ממצב שמע בלבד
                document.getElementById('audio-only-overlay').classList.add('hidden');
            }
        }

        function triggerStrawberryConfetti() {
            const container = document.createElement('div');
            container.className = 'fixed inset-0 z-[100] pointer-events-none overflow-hidden';
            document.body.appendChild(container);

            for (let i = 0; i < 40; i++) {
                const berry = document.createElement('div');
                berry.innerText = '🍓';
                berry.style.position = 'absolute';
                berry.style.left = Math.random() * 100 + 'vw';
                berry.style.top = '-50px';
                berry.style.fontSize = (Math.random() * 20 + 20) + 'px';
                berry.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                container.appendChild(berry);
            }

            setTimeout(() => { container.remove(); }, 5000);
        }

        // --- שמע בלבד ---
        function toggleAudioOnly() {
            const overlay = document.getElementById('audio-only-overlay');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                showToast('מצב שמע בלבד הופעל 🌙');
            } else {
                overlay.classList.add('hidden');
            }
        }

        // --- חלון צף (Mini Player) ---
        function toggleMiniPlayer() {
            const modal = document.getElementById('video-modal');
            isMiniPlayer = !isMiniPlayer;

            if (isMiniPlayer) {
                modal.classList.add('mini-player-mode');
                modal.classList.remove('modal-overlay');
                document.body.style.overflow = 'auto'; // החזרת גלילה
                showToast('מסך קטן הופעל 📱');
            } else {
                modal.classList.remove('mini-player-mode');
                modal.classList.add('modal-overlay');
                document.body.style.overflow = 'hidden';
            }
        }

        // --- מועדפים ושיתוף ---
        function updateFavoriteModalUI() {
            const isFav = favorites.includes(currentOpenVideoId);
            const favContainer = document.getElementById('fav-icon-container');
            const favIcon = document.getElementById('fav-icon');
            
            if (isFav) {
                favIcon.setAttribute('fill', 'currentColor');
                favIcon.classList.add('text-red-600');
                favContainer.classList.add('border-white', 'bg-black/40');
            } else {
                favIcon.setAttribute('fill', 'none');
                favIcon.classList.remove('text-red-600');
                favContainer.classList.remove('border-white', 'bg-black/40');
            }
        }

        function toggleCurrentFavorite() {
            if (!currentOpenVideoId) return;
            const index = favorites.indexOf(currentOpenVideoId);
            if (index > -1) {
                favorites.splice(index, 1);
                showToast('הוסר מהרשימה שלי 🗑️');
            } else {
                favorites.push(currentOpenVideoId);
                showToast('נוסף לרשימה שלי! ❤️');
            }
            localStorage.setItem('tutflix_favorites', JSON.stringify(favorites));
            updateFavoriteModalUI();
            renderFavorites();
        }

        function shareCurrentVideo() {
            if (!currentOpenVideoId) return;
            const video = videoData.find(v => v.id === currentOpenVideoId);
            const url = `https://youtu.be/${currentOpenVideoId}`;
            const shareData = { title: 'שיר מגן תות 🍓', text: `תראו את השיר "${video ? video.title : ''}" שהילדים שומעים בפעוטון תות!`, url: url };

            if (navigator.share && /mobile|android|iphone/i.test(navigator.userAgent)) {
                navigator.share(shareData).catch(console.error);
            } else {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast('הקישור הועתק ללוח! 📋');
            }
        }

        // --- התראות (Toasts) ---
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        window.onload = initApp;

    </script>
</body>
</html>
